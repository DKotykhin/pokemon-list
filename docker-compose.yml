services:
  pokemon-db:
    image: postgres:latest
    container_name: pokemon-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pokemon-list
    ports:
      - "5432:5432"
    networks:
      - pokemon-network
    volumes:
      - pokemon-db-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:latest
    container_name: adminer-service
    ports:
      - "8080:8080"
    depends_on:
      - pokemon-db
    networks:
      - pokemon-network

  app:
    build: .
    container_name: pokemon-app
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@pokemon-db:5432/pokemon-list
    depends_on:
      pokemon-db:
        condition: service_healthy
    networks:
      - pokemon-network

volumes:
  pokemon-db-data:

networks:
  pokemon-network:
